{% extends "base_customer.html" %}
{% block content %}
<div class="min-h-[calc(100vh-60px)] flex items-center justify-center bg-slate-50 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner">🔑</div>
            <h2 class="text-3xl font-extrabold text-slate-800">ลืมรหัสผ่าน?</h2>
            <p class="text-slate-500 mt-2">กรอกอีเมลที่ใช้สมัครระบบ เราจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปให้ครับ</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">อีเมลของคุณ</label>
                <input type="email" name="email" required placeholder="example@email.com"
                       class="w-full h-14 bg-slate-50 border border-slate-200 rounded-xl px-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium">
            </div>
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl font-extrabold shadow-lg transform hover:-translate-y-0.5 transition-all">
                ส่งลิงก์รีเซ็ตรหัสผ่าน
            </button>
        </form>
        
        <div class="mt-8 text-center text-sm">
            <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">กลับไปหน้าเข้าสู่ระบบ</a>
        </div>
    </div>
</div>
{% endblock %}
