{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Prompt', sans-serif; background-image: url("{% static 'images/cafe.jpg' %}"); }
  </style>
</head>
<body class="bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">
  
  <div class="fixed inset-0 bg-white/30 backdrop-blur-sm"></div>

  <div class="relative min-h-screen flex items-center justify-center px-4 pt-16">
    <div class="bg-white/95 backdrop-blur-xl p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-white">
      
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-600 text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg rotate-3">🔑</div>
        <h2 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-purple-600">รีเซ็ตรหัสผ่าน</h2>
        <p class="text-gray-500 text-sm mt-2">กรอกอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสใหม่</p>
      </div>

      <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-extrabold text-gray-700 mb-2 ml-1">อีเมลที่ใช้สมัคร</label>
          <input type="email" name="email" required placeholder="example@email.com"
            class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-purple-400 focus:bg-white outline-none transition-all font-medium">
        </div>

        <button type="submit" 
          class="w-full bg-gradient-to-r from-purple-600 to-fuchsia-500 hover:from-purple-700 hover:to-fuchsia-600 text-white font-extrabold py-4 rounded-xl transition-all shadow-md transform hover:-translate-y-0.5">
          ส่งลิงก์กู้คืนรหัสผ่าน
        </button>
      </form>

      <div class="mt-8 text-center">
        <a href="{% url 'login' %}" class="text-sm font-bold text-gray-500 hover:text-purple-600 transition-colors">
          ⬅️ กลับไปหน้าเข้าสู่ระบบ
        </a>
      </div>
    </div>
  </div>
</body>
</html>
