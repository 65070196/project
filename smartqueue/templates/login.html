{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ | On-Queue</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-image: url("{% static 'images/cafe.jpg' %}");
    }
  </style>
</head>

<body class="font-sans bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">

  <div class="fixed top-0 w-full flex items-center px-6 py-3 bg-[#a7a1f9] shadow-sm z-50">
    <div class="bg-white rounded-full w-10 h-10 shadow-sm mr-3"></div>
    <div class="text-xl font-bold text-black tracking-wide">On-Queue</div>
  </div>

  <div class="fixed inset-0 bg-white/40 z-0"></div>

  <div class="relative min-h-screen flex items-center justify-center px-4 z-10 pt-16">
    
    <div class="bg-white p-8 rounded-[20px] shadow-2xl w-full max-w-md border border-gray-200">
      
      <h2 class="text-2xl font-bold text-center mb-8 text-gray-900">เข้าสู่ระบบ</h2>

      <form action="#" method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div>
          <label for="username" class="block text-base font-bold text-gray-700 mb-2 ml-1">ชื่อผู้ใช้งาน</label>
          <input type="text" id="username" name="username" required 
            class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors shadow-sm">
        </div>

        <div>
          <label for="password" class="block text-base font-bold text-gray-700 mb-2 ml-1">รหัสผ่าน</label>
          <input type="password" id="password" name="password" required 
            class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors shadow-sm">
        </div>

        {% if error_message %}
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded text-sm text-center">
            {{ error_message }}
          </div>
        {% endif %}

        <div class="pt-4">
            <button type="submit" 
            class="w-full bg-blue-400 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition-all duration-200 shadow-md text-lg">
            เข้าสู่ระบบ
            </button>
        </div>
      </form>

      <div class="flex justify-between items-center mt-8 text-sm font-bold px-2">
        <a href="{% url 'register-c' %}" class="text-gray-600 hover:text-blue-500 hover:underline transition-colors">
          ไม่มีบัญชีผู้ใช้งาน?
        </a>
        <a href="" class="text-gray-600 hover:text-blue-500 hover:underline transition-colors">
          ลืมรหัสผ่าน?
        </a>
      </div>

    </div>
  </div>

</body>
</html>
