{% extends "base_shop.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden bg-slate-50/50">
  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x border-gray-100 overflow-y-auto no-scrollbar">
    <div class="p-6 md:p-10 pb-24">
      
      <div class="mb-8 border-l-4 border-blue-500 pl-4 sticky top-0 bg-white/95 backdrop-blur z-10 py-3 shadow-sm -mx-6 md:-mx-10 px-6 md:px-10">
        <h2 class="text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-blue-700">แก้ไขโปรโมชั่น</h2>
        <p class="text-gray-500 text-sm font-medium mt-1">ปรับปรุงและอัปเดตข้อมูลโปรโมชั่นในระบบ</p>
      </div>

      <form method="POST" class="max-w-4xl mx-auto space-y-6 bg-white p-6 md:p-8 rounded-3xl border border-slate-200/60 shadow-sm">
        {% csrf_token %}
        
        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 mb-2 flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xl shadow-inner">🏷️</div>
            <div>
              <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">หมายเลขโปรโมชั่นอ้างอิง</p>
              <p class="text-lg font-extrabold text-blue-700">#{{ promo.promo_id }}</p>
            </div>
          </div>
        </div>

        <div class="space-y-4">
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-5 rounded-2xl border border-slate-100 bg-white shadow-sm hover:border-blue-200 transition-colors">
            <div>
              <label class="block text-sm font-extrabold text-slate-400 mb-2">ชื่อโปรโมชั่นเดิม</label>
              <input type="text" value="{{ promo.promo_name }}" disabled
                     class="w-full h-12 px-4 rounded-xl bg-slate-100 text-slate-500 font-semibold cursor-not-allowed border border-slate-200 border-dashed">
            </div>
            <div>
              <label class="block text-sm font-extrabold text-slate-800 mb-2">ชื่อโปรโมชั่นใหม่</label>
              <input type="text" name="promo_name" placeholder="เว้นว่างไว้หากไม่ต้องการเปลี่ยน"
                     class="w-full h-12 px-4 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-5 rounded-2xl border border-slate-100 bg-white shadow-sm hover:border-blue-200 transition-colors">
            <div>
              <label class="block text-sm font-extrabold text-slate-400 mb-2">รายละเอียดเดิม</label>
              <input type="text" value="{{ promo.description }}" disabled
                     class="w-full h-12 px-4 rounded-xl bg-slate-100 text-slate-500 font-semibold cursor-not-allowed border border-slate-200 border-dashed">
            </div>
            <div>
              <label class="block text-sm font-extrabold text-slate-800 mb-2">รายละเอียดใหม่</label>
              <input type="text" name="description" placeholder="เว้นว่างไว้หากไม่ต้องการเปลี่ยน"
                     class="w-full h-12 px-4 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-5 rounded-2xl border border-slate-100 bg-white shadow-sm hover:border-blue-200 transition-colors">
            <div>
              <label class="block text-sm font-extrabold text-slate-400 mb-2">ส่วนลดเดิม (%)</label>
              <div class="relative">
                <input type="text" value="{{ promo.discount_rate|floatformat:0 }}" disabled
                       class="w-full h-12 pl-4 pr-10 rounded-xl bg-slate-100 text-slate-500 font-semibold cursor-not-allowed border border-slate-200 border-dashed">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 font-bold">%</div>
              </div>
            </div>
            <div>
              <label class="block text-sm font-extrabold text-slate-800 mb-2">ส่วนลดใหม่ (%)</label>
              <div class="relative">
                <input type="number" name="discount_rate" placeholder="เว้นว่างไว้หากไม่ต้องการเปลี่ยน" step="0.01" min="0"
                       class="w-full h-12 pl-4 pr-10 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm">
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400 font-bold">%</div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-5 rounded-2xl border border-slate-100 bg-white shadow-sm hover:border-blue-200 transition-colors">
            <div>
              <label class="block text-sm font-extrabold text-slate-800 mb-2">
                วันเริ่มต้น <span class="text-xs text-slate-400 font-medium ml-1">(เดิม: {{ promo.start_date|date:"d M Y" }})</span>
              </label>
              <input type="date" name="start_date"
                     class="w-full h-12 px-4 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm cursor-pointer">
            </div>
            <div>
              <label class="block text-sm font-extrabold text-slate-800 mb-2">
                วันสิ้นสุด <span class="text-xs text-slate-400 font-medium ml-1">(เดิม: {{ promo.end_date|date:"d M Y" }})</span>
              </label>
              <input type="date" name="end_date"
                     class="w-full h-12 px-4 rounded-xl bg-slate-50 border border-slate-200 text-slate-900 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm cursor-pointer">
            </div>
          </div>

        </div>

        <div class="flex flex-col sm:flex-row justify-end gap-4 pt-6 border-t border-slate-100 mt-8">
          <a href="{% url 'promo-manage' %}"
             class="w-full sm:w-auto px-8 py-3.5 bg-slate-100 hover:bg-slate-200 transition text-slate-700 rounded-xl font-extrabold shadow-sm text-center flex items-center justify-center">
            ยกเลิก
          </a>
          <button type="submit"
                  class="w-full sm:w-auto px-10 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition-all text-white rounded-xl font-extrabold shadow-md hover:shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
            บันทึกการแก้ไข
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
{% endblock %}
