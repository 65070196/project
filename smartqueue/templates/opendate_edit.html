{% extends "base_shop.html" %} {% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden">
  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x overflow-y-auto no-scrollbar">
    <div class="p-6 md:p-10 pb-24">
      
      <div class="mb-8 border-l-4 border-blue-500 pl-4 sticky top-0 bg-white/95 backdrop-blur z-10 py-2">
        <h2 class="text-3xl font-bold text-gray-800">แก้ไขเวลาทำการ</h2>
        <p class="text-sm text-gray-500 mt-1">ปรับปรุงวันและเวลาเปิด-ปิดร้านสำหรับกลุ่มเวลานี้</p>
      </div>

      <form method="POST" class="max-w-3xl mx-auto space-y-8 bg-gray-50 p-8 rounded-2xl border border-gray-100 shadow-sm">
        {% csrf_token %}
        
        <div>
          <label class="block text-base font-bold text-gray-800 mb-4">
            1. เลือกวันที่เปิดทำการ <span class="text-red-500">*</span>
          </label>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <label class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-colors has-[:checked]:bg-blue-100 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 font-semibold text-gray-600">
              <input type="checkbox" name="days" value="0" class="w-5 h-5 accent-blue-600" {% if 0 in opendate.working_days %}checked{% endif %}>
              จันทร์
            </label>
            <label class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-colors has-[:checked]:bg-blue-100 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 font-semibold text-gray-600">
              <input type="checkbox" name="days" value="1" class="w-5 h-5 accent-blue-600" {% if 1 in opendate.working_days %}checked{% endif %}>
              อังคาร
            </label>
            <label class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-colors has-[:checked]:bg-blue-100 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 font-semibold text-gray-600">
              <input type="checkbox" name="days" value="2" class="w-5 h-5 accent-blue-600" {% if 2 in opendate.working_days %}checked{% endif %}>
              พุธ
            </label>
            <label class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-colors has-[:checked]:bg-blue-100 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 font-semibold text-gray-600">
              <input type="checkbox" name="days" value="3" class="w-5 h-5 accent-blue-600" {% if 3 in opendate.working_days %}checked{% endif %}>
              พฤหัสบดี
            </label>
            <label class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-colors has-[:checked]:bg-blue-100 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 font-semibold text-gray-600">
              <input type="checkbox" name="days" value="4" class="w-5 h-5 accent-blue-600" {% if 4 in opendate.working_days %}checked{% endif %}>
              ศุกร์
            </label>
            <label class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-colors has-[:checked]:bg-blue-100 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 font-semibold text-gray-600">
              <input type="checkbox" name="days" value="5" class="w-5 h-5 accent-blue-600" {% if 5 in opendate.working_days %}checked{% endif %}>
              เสาร์
            </label>
            <label class="flex items-center gap-3 bg-white border border-gray-200 px-4 py-3 rounded-xl cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-colors has-[:checked]:bg-blue-100 has-[:checked]:border-blue-500 has-[:checked]:text-blue-700 font-semibold text-gray-600">
              <input type="checkbox" name="days" value="6" class="w-5 h-5 accent-blue-600" {% if 6 in opendate.working_days %}checked{% endif %}>
              อาทิตย์
            </label>
          </div>
        </div>

        <hr class="border-gray-200">

        <div>
          <label class="block text-base font-bold text-gray-800 mb-4">
            2. เวลาทำการ
          </label>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-2">เวลาเปิดร้าน</label>
              <input type="time" name="open_time" required value="{{ opendate.open_time|time:'H:i' }}"
                     class="w-full h-14 px-4 rounded-xl bg-white border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-2">เวลาปิดร้าน</label>
              <input type="time" name="close_time" required value="{{ opendate.close_time|time:'H:i' }}"
                     class="w-full h-14 px-4 rounded-xl bg-white border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all">
            </div>
          </div>
        </div>

        {% if error_message %}
          <div class="bg-red-100 text-red-600 px-4 py-3 rounded-xl text-sm text-center font-bold">
              {{ error_message }}
          </div>
        {% endif %}

        <div class="flex flex-col-reverse md:flex-row gap-4 pt-4 border-t border-gray-200">
          <a href="" class="flex-1 py-4 bg-gray-200 hover:bg-gray-300 text-gray-700 text-center rounded-xl font-bold transition shadow-sm text-lg">
            ยกเลิก
          </a>
          <button type="submit" class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition shadow-sm text-lg">
            บันทึกการแก้ไข
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
{% endblock %}
