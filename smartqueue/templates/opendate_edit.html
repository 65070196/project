{% extends "base_shop.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden z-0">
  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x border-gray-100 overflow-y-auto no-scrollbar">
    <div class="p-6 md:p-10 pb-24">

      <div class="mb-8 border-l-4 border-yellow-400 pl-4">
        <h2 class="text-3xl font-bold text-gray-800">เวลาทำการ</h2>
        <p class="text-gray-500 text-sm">กำหนดเวลาเปิด-ปิดร้านในแต่ละวัน</p>
      </div>

      <form method="POST" action="" class="max-w-4xl mx-auto space-y-4">
        {% csrf_token %}

        <div class="hidden md:grid grid-cols-12 gap-4 px-6 py-3 bg-gray-800 text-white font-bold rounded-t-xl text-center">
            <div class="col-span-3 text-left">วันในสัปดาห์</div>
            <div class="col-span-2">สถานะ</div>
            <div class="col-span-3">เวลาเปิด</div>
            <div class="col-span-3">เวลาปิด</div>
        </div>

        <div class="space-y-4 md:space-y-0 md:bg-gray-50 md:border md:border-gray-200 md:rounded-b-xl md:p-4">
            
            {% for day in days_data %}
            <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center bg-white p-5 md:p-3 rounded-xl border border-gray-100 shadow-sm md:shadow-none hover:bg-gray-50 transition">
                
                <div class="col-span-1 md:col-span-3 font-bold text-lg md:text-base flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-500 md:hidden"></span>
                    วัน{{ day.name }}
                </div>
                
                <div class="col-span-1 md:col-span-2 flex items-center md:justify-center">
                    <label class="inline-flex items-center cursor-pointer">
                        <input type="checkbox" name="{{ day.key }}_is_closed" class="sr-only peer" 
                               onchange="toggleTimeInputs('{{ day.key }}', this.checked)"
                               {% if day.is_closed %}checked{% endif %}>
                        <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
                        <span class="ms-3 text-sm font-semibold text-gray-700 peer-checked:text-red-500">ปิดร้าน</span>
                    </label>
                </div>

                <div class="col-span-1 md:col-span-3 flex flex-col">
                    <label class="md:hidden text-xs text-gray-500 mb-1 font-bold">เวลาเปิด</label>
                    <input type="time" id="open_{{ day.key }}" name="{{ day.key }}_open" 
                           value="{{ day.open_time|time:'H:i'|default:'' }}"
                           class="w-full h-12 md:h-10 px-4 rounded-lg bg-gray-100 border-none outline-none focus:ring-2 focus:ring-blue-400 transition disabled:opacity-50 disabled:bg-gray-200 disabled:cursor-not-allowed">
                </div>

                <div class="col-span-1 md:col-span-3 flex flex-col">
                    <label class="md:hidden text-xs text-gray-500 mb-1 font-bold">เวลาปิด</label>
                    <input type="time" id="close_{{ day.key }}" name="{{ day.key }}_close" 
                           value="{{ day.close_time|time:'H:i'|default:'' }}"
                           class="w-full h-12 md:h-10 px-4 rounded-lg bg-gray-100 border-none outline-none focus:ring-2 focus:ring-blue-400 transition disabled:opacity-50 disabled:bg-gray-200 disabled:cursor-not-allowed">
                </div>

            </div>
            {% endfor %}

        </div>

        <div class="pt-8 md:pt-10 max-w-sm mx-auto">
          <button type="submit" class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md hover:shadow-lg transition-all">
            บันทึกเวลาทำการ
          </button>
        </div>

      </form>

    </div>
  </div>
</div>

<script>
    function toggleTimeInputs(dayKey, isClosed) {
        const openInput = document.getElementById(`open_${dayKey}`);
        const closeInput = document.getElementById(`close_${dayKey}`);
        
        if (isClosed) {
            openInput.disabled = true;
            closeInput.disabled = true;
            openInput.value = ''; // ล้างค่าทิ้งถ้าปิดร้าน
            closeInput.value = '';
        } else {
            openInput.disabled = false;
            closeInput.disabled = false;
        }
    }

    // รันตอนเปิดหน้าเว็บครั้งแรก เพื่อเช็คว่าวันไหนปิดร้านอยู่บ้าง จะได้ล็อคช่องให้ถูกต้อง
    window.addEventListener('DOMContentLoaded', () => {
        {% for day in days_data %}
            {% if day.is_closed %}
                toggleTimeInputs('{{ day.key }}', true);
            {% endif %}
        {% endfor %}
    });
</script>
{% endblock %}
