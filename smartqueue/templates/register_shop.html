{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครบัญชีร้านค้า - On-Queue</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-image: url("{% static 'images/cafe.jpg' %}");
    }
  </style>
</head>

<body class="font-sans bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">

  <div class="fixed top-0 w-full flex items-center px-6 py-3 bg-[#f9d28f] shadow-sm z-50">
    <div class="bg-white rounded-full w-10 h-10 shadow-sm mr-3"></div>
    <div class="text-xl font-bold text-black tracking-wide">On-Queue</div>
  </div>

  <div class="fixed inset-0 bg-white/40 z-0"></div>

  <div class="relative min-h-screen flex items-center justify-center px-4 z-10 pt-20 pb-10">
    
    <div class="bg-white p-8 rounded-[20px] shadow-2xl w-full max-w-2xl border border-gray-200">
      
      <h2 class="text-2xl font-bold text-center mb-8 text-gray-900">สมัครบัญชีร้านค้า</h2>

      <form class="space-y-6" method="POST">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="md:col-span-2">
                <label class="block text-base font-bold text-gray-700 mb-2 ml-1">ชื่อร้านค้า</label>
                <input type="text" name="shop_name" placeholder="กรอกชื่อร้านค้า"
                    class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors shadow-sm">
            </div>

            <div>
                <label class="block text-base font-bold text-gray-700 mb-2 ml-1">ชื่อผู้ใช้งาน</label>
                <input type="text" name="username" placeholder="กรอกชื่อผู้ใช้งาน"
                    class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors shadow-sm">
            </div>

            <div>
                <label class="block text-base font-bold text-gray-700 mb-2 ml-1">เบอร์โทรศัพท์</label>
                <input type="tel" name="phone" placeholder="กรอกเบอร์โทรศัพท์"
                    class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors shadow-sm">
            </div>

            <div class="md:col-span-2">
                <label class="block text-base font-bold text-gray-700 mb-2 ml-1">อีเมล</label>
                <input type="email" name="email" placeholder="กรอกอีเมล"
                    class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors shadow-sm">
            </div>

            <div>
                <label class="block text-base font-bold text-gray-700 mb-2 ml-1">รหัสผ่าน</label>
                <input type="password" name="password" placeholder="ตั้งรหัสผ่าน"
                    class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors shadow-sm">
            </div>

            <div>
                <label class="block text-base font-bold text-gray-700 mb-2 ml-1">ยืนยันรหัสผ่าน</label>
                <input type="password" name="password_confirm" placeholder="ยืนยันรหัสผ่าน"
                    class="w-full px-4 py-3 rounded-xl bg-white border border-gray-300 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-colors shadow-sm">
            </div>

        </div>

        {% if error_message %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded text-sm text-center">
                {{ error_message }}
            </div>
        {% endif %}

        <div class="pt-2">
            <button type="submit" 
                class="w-full bg-blue-400 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl transition-all duration-200 shadow-md text-lg">
                ยืนยันการสมัคร
            </button>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mt-6 text-sm font-bold px-2 gap-4 text-center">
            <a href="{% url 'register-c' %}" class="text-gray-600 hover:text-blue-500 hover:underline transition-colors">
                สมัครบัญชีทั่วไป?
            </a>
            <a href="{% url 'login' %}" class="text-blue-500 hover:text-blue-700 hover:underline transition-colors">
                มีบัญชีผู้ใช้อยู่แล้ว?
            </a>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
