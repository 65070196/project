{% extends "base_shop.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden">

  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x overflow-y-auto no-scrollbar">

    <div class="p-6 md:p-10 pb-24">

      <div class="mb-6 border-l-4 border-yellow-400 pl-4">
        <h2 class="text-3xl font-bold text-gray-800">เพิ่มโปรโมชั่น</h2>
        <p class="text-gray-500 text-sm">จัดการโปรโมชั่นภายในร้าน</p>
      </div>

      <div class="max-w-3xl mx-auto space-y-6">

        <form method="POST" class="max-w-3xl mx-auto space-y-6">
  
        {% csrf_token %}

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              ชื่อโปรโมชั่น <span class="text-red-500">*</span>
            </label>
            <input type="text" name="promo_name" required maxlength="24"
                  class="w-full h-14 bg-gray-100 rounded-xl px-4 outline-none focus:ring-2 focus:ring-yellow-400"
                  placeholder="เช่น ลดวันจันทร์">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              รายละเอียดโปรโมชั่น
            </label>
            <textarea name="description" maxlength="24"
              class="w-full h-24 bg-gray-100 rounded-xl px-4 py-3 outline-none resize-none focus:ring-2 focus:ring-yellow-400"
              placeholder="รายละเอียดสั้นๆ (ไม่เกิน 24 ตัวอักษร)"></textarea>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              ส่วนลด (%)<span class="text-red-500">*</span>
            </label>
            <input type="number" name="discount_rate" required step="0.01" min="0"
                  class="w-full h-14 bg-gray-100 rounded-xl px-4 outline-none focus:ring-2 focus:ring-yellow-400"
                  placeholder="ระบุส่วนลดเป็นตัวเลข % (เช่น 10 หรือ 20)">
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                วันเริ่มต้น <span class="text-red-500">*</span>
              </label>
              <input type="date" name="start_date" required
                    class="w-full h-14 bg-gray-100 rounded-xl px-4 outline-none focus:ring-2 focus:ring-yellow-400">
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                วันสิ้นสุด <span class="text-red-500">*</span>
              </label>
              <input type="date" name="end_date" required
                    class="w-full h-14 bg-gray-100 rounded-xl px-4 outline-none focus:ring-2 focus:ring-yellow-400">
            </div>
          </div>

          <div>
            <button type="submit"
              class="w-full py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold transition">
              เพิ่มโปรโมชั่น
            </button>
          </div>

        </form>
      </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
