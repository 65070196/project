{% extends "base_shop.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden bg-slate-50/50">

  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x border-gray-100 overflow-y-auto no-scrollbar">

    <div class="p-6 md:p-10 pb-24">

      <div class="mb-8 border-l-4 border-blue-500 pl-4 sticky top-0 bg-white/95 backdrop-blur z-10 py-3 shadow-sm -mx-6 md:-mx-10 px-6 md:px-10">
        <h2 class="text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-blue-700">เพิ่มโปรโมชั่น</h2>
        <p class="text-gray-500 text-sm font-medium mt-1">สร้างโปรโมชั่นใหม่เพื่อดึงดูดลูกค้าเข้าร้าน</p>
      </div>

      <form method="POST" class="max-w-3xl mx-auto space-y-6 bg-white p-6 md:p-8 rounded-3xl border border-slate-200/60 shadow-sm">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-extrabold text-slate-700 mb-2">
            ชื่อโปรโมชั่น <span class="text-rose-500">*</span>
          </label>
          <input type="text" name="promo_name" required maxlength="24"
                class="w-full h-14 bg-slate-50 border border-slate-200 rounded-xl px-4 text-slate-800 font-medium outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all shadow-sm"
                placeholder="เช่น โปรวันเกิด, ลดฉลองเปิดร้านใหม่">
        </div>

        <div>
          <label class="block text-sm font-extrabold text-slate-700 mb-2">
            รายละเอียดโปรโมชั่น
          </label>
          <textarea name="description" maxlength="24"
            class="w-full h-24 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-800 font-medium outline-none resize-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all shadow-sm"
            placeholder="รายละเอียดสั้นๆ (ไม่เกิน 24 ตัวอักษร)"></textarea>
        </div>

        <div>
          <label class="block text-sm font-extrabold text-slate-700 mb-2">
            ส่วนลด (%)<span class="text-rose-500">*</span>
          </label>
          <div class="relative">
            <input type="number" name="discount_rate" required step="0.01" min="0"
                  class="w-full h-14 bg-slate-50 border border-slate-200 rounded-xl pl-4 pr-12 text-slate-800 font-extrabold outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all shadow-sm text-lg"
                  placeholder="เช่น 10 หรือ 20">
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
              <span class="text-slate-400 font-extrabold text-lg">%</span>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-extrabold text-slate-700 mb-2">
              วันเริ่มต้น <span class="text-rose-500">*</span>
            </label>
            <input type="date" name="start_date" required
                  class="w-full h-14 bg-slate-50 border border-slate-200 rounded-xl px-4 text-slate-800 font-bold outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all shadow-sm cursor-pointer">
          </div>

          <div>
            <label class="block text-sm font-extrabold text-slate-700 mb-2">
              วันสิ้นสุด <span class="text-rose-500">*</span>
            </label>
            <input type="date" name="end_date" required
                  class="w-full h-14 bg-slate-50 border border-slate-200 rounded-xl px-4 text-slate-800 font-bold outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all shadow-sm cursor-pointer">
          </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-end gap-4 pt-6 border-t border-slate-100 mt-8">
          <button type="button" onclick="history.back()"
                  class="w-full sm:w-auto px-8 py-3.5 bg-slate-100 hover:bg-slate-200 transition text-slate-700 rounded-xl font-extrabold shadow-sm text-center">
              ยกเลิก
          </button>

          <button type="submit"
                  class="w-full sm:w-auto px-10 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 transition-all text-white rounded-xl font-extrabold shadow-md hover:shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-0.5 flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
              เพิ่มโปรโมชั่น
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
{% endblock %}
