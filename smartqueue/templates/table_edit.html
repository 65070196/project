{% extends "base_shop.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden">

  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x overflow-y-auto no-scrollbar">

    <div class="p-6 md:p-10 pb-24">

      
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800">แก้ไขประเภทโต๊ะ</h2>
        <p class="text-sm text-gray-500">ปรับปรุงข้อมูลประเภทโต๊ะในระบบ</p>
      </div>

      
        <div>
          <label class="block text-sm font-semibold mb-2">หมายเลขประเภทโต๊ะ</label>
          <input type="text" value="1" disabled
                 class="w-full h-12 px-4 rounded-xl bg-gray-300">
        </div>

        
        <div>
          <label class="block text-sm font-semibold mb-2">ชื่อประเภทโต๊ะ</label>
          <input type="text" value="โต๊ะเดี่ยว"
                 class="w-full h-12 px-4 rounded-xl bg-gray-100">
        </div>

        
        <div>
          <label class="block text-sm font-semibold mb-2">รายละเอียดเดิม</label>
          <input type="text" value="โต๊ะสำหรับลูกค้า 1 คน" disabled
                 class="w-full h-12 px-4 rounded-xl bg-gray-300">
        </div>

        
        <div>
          <label class="block text-sm font-semibold mb-2">รายละเอียดใหม่</label>
          <input type="text" placeholder="กรอกรายละเอียดใหม่"
                 class="w-full h-12 px-4 rounded-xl bg-gray-100">
        </div>

        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-semibold mb-2">จำนวนโต๊ะเดิม</label>
            <input type="number" value="10" disabled
                   class="w-full h-12 px-4 rounded-xl bg-gray-300">
          </div>

          <div>
            <label class="block text-sm font-semibold mb-2">จำนวนโต๊ะใหม่</label>
            <input type="number" placeholder="กรอกจำนวนโต๊ะ"
                   class="w-full h-12 px-4 rounded-xl bg-gray-100">
          </div>

        </div>

        <div>
          <label class="block text-sm font-semibold mb-2">รูปภาพประกอบ</label>
          <div class="h-32 bg-gray-300 rounded-xl flex items-center justify-center text-4xl">
            🖼️
          </div>
        </div>

        <div class="flex gap-4 pt-4">
          <a href="{% url 'table-manage' %}"
             class="flex-1 py-3 bg-gray-400 text-center rounded-xl font-bold text-white">
            ยกเลิก
          </a>
          <button
             class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold">
            บันทึกการแก้ไข
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
{% endblock %}
