{% extends "base_shop.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden">
  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x overflow-y-auto no-scrollbar">
    <div class="p-6 md:p-10 pb-24">
      
      <div class="mb-6 border-b border-gray-200 pb-4">
        <h2 class="text-2xl font-bold text-gray-800">แก้ไขประเภทโต๊ะ</h2>
        <p class="text-sm text-gray-500 mt-1">ปรับปรุงข้อมูลและรูปภาพของประเภทโต๊ะในร้านของคุณ</p>
      </div>

      <form method="POST" enctype="multipart/form-data" class="max-w-3xl mx-auto space-y-6">
        {% csrf_token %}
        
        <div class="mb-10 max-w-sm mx-auto">
          <label class="block text-sm font-bold text-gray-700 mb-3 text-center">รูปภาพประเภทโต๊ะ</label>
          
          <div id="image-label" class="w-full aspect-square bg-white rounded-2xl flex flex-col items-center justify-center hover:bg-gray-50 border-2 {% if table.image %}border-solid border-gray-100 p-1{% else %}border-dashed border-gray-300{% endif %} hover:border-indigo-400 transition-all overflow-hidden relative group shadow-sm">
            
            <label for="image-input" id="placeholder-content" class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 cursor-pointer {% if table.image %}hidden{% endif %}">
              <span class="text-5xl text-gray-400 mb-3 transition-transform group-hover:scale-110">🪑</span>
              <span class="text-sm font-semibold text-gray-500">อัปโหลดรูปภาพโต๊ะ</span>
              <span class="text-xs text-gray-400 mt-1">คลิกเพื่อเลือกไฟล์ (สูงสุด 4.5MB)</span>
            </label>

            <img id="image-preview" 
                 src="{% if table.image %}{{ table.image.image_path.url }}{% else %}#{% endif %}" 
                 alt="Table Image Preview" 
                 class="{% if not table.image %}hidden{% endif %} absolute inset-0 w-full h-full object-cover rounded-2xl p-1 pointer-events-none">
            
            <input type="file" name="image" id="image-input" class="sr-only" accept="image/*" onchange="previewImage(event)">
            
            <button type="button" id="remove-image-btn" onclick="removeImage(event)" class="{% if not table.image %}hidden{% endif %} absolute top-2 right-2 bg-white/80 hover:bg-red-500 text-red-500 hover:text-white rounded-full p-1.5 shadow-md backdrop-blur-sm z-10 transition-colors" title="ลบรูปภาพ">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
              </svg>
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6 bg-gray-50 p-6 rounded-2xl border border-gray-100">
          
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-600 mb-2">หมายเลขประเภทโต๊ะ</label>
            <input type="text" value="{{ table.table_id }}" disabled class="w-full h-12 px-4 rounded-xl bg-gray-200 text-gray-600 border border-gray-300 cursor-not-allowed">
          </div>
          
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-2">ชื่อประเภทโต๊ะปัจจุบัน</label>
            <input type="text" value="{{ table.name }}" disabled class="w-full h-12 px-4 rounded-xl bg-gray-100 text-gray-500 border border-gray-200 cursor-not-allowed">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2 font-bold">ชื่อประเภทโต๊ะใหม่</label>
            <input type="text" name="name" placeholder="กรอกชื่อใหม่ (หากต้องการเปลี่ยน)" class="w-full h-12 px-4 rounded-xl bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 transition text-gray-800">
          </div>
          
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-2">รายละเอียดปัจจุบัน</label>
            <input type="text" value="{{ table.description|default:'ไม่มีรายละเอียด' }}" disabled class="w-full h-12 px-4 rounded-xl bg-gray-100 text-gray-500 border border-gray-200 cursor-not-allowed">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2 font-bold">รายละเอียดใหม่</label>
            <input type="text" name="description" placeholder="กรอกรายละเอียดใหม่" class="w-full h-12 px-4 rounded-xl bg-white border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 transition text-gray-800">
          </div>
          
          <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6 pt-2 border-t border-gray-200 mt-2">
            
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">จำนวนโต๊ะทั้งหมดที่มี (ปัจจุบัน: {{ table.amount }})</label>
              <div class="h-12 bg-white rounded-xl flex items-center px-4 border border-gray-300 focus-within:ring-2 focus-within:ring-blue-400 transition">
                <span class="text-gray-400 mr-2 text-sm">🛋️</span>
                <input type="number" name="amount" value="{{ table.amount }}" min="1" required class="w-full bg-transparent outline-none text-gray-800 font-semibold">
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">ความจุสูงสุด (ปัจจุบัน: {{ table.capacity|default:'0' }})</label>
              <div class="h-12 bg-white rounded-xl flex items-center px-4 border border-gray-300 focus-within:ring-2 focus-within:ring-blue-400 transition">
                <span class="text-gray-400 mr-2 text-sm">👥</span>
                <input type="number" name="capacity" value="{{ table.capacity|default:'' }}" min="1" required class="w-full bg-transparent outline-none text-gray-800 font-semibold">
                <span class="text-gray-500 text-sm ml-2">ท่าน</span>
              </div>
            </div>

            <p class="md:col-span-2 text-xs text-gray-500 text-center">*หากไม่ต้องการเปลี่ยนจำนวนหรือความจุ ให้คงค่าเดิมไว้</p>
          </div>

        </div>

        <div class="flex gap-4 pt-6 border-t border-gray-200 mt-8">
          <a href="{% url 'table-manage' %}" class="flex-1 py-3 bg-gray-100 text-center rounded-xl font-bold text-gray-700 hover:bg-gray-200 transition border border-gray-300">ยกเลิก</a>
          <button type="submit" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition shadow-md shadow-blue-100">บันทึกการแก้ไข</button>
        </div>

      </form>
    </div>
  </div>
</div>

{% endblock %}
