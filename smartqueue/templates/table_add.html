{% extends "base_shop.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden">
  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x overflow-y-auto no-scrollbar">
    <div class="p-6 md:p-10 pb-24">

      <div class="mb-8 border-l-4 border-yellow-400 pl-4">
        <h2 class="text-3xl font-bold text-gray-800">เพิ่มประเภทโต๊ะ</h2>
        <p class="text-gray-500 text-sm">จัดการประเภทโต๊ะภายในร้าน</p>
      </div>

      <form method="POST" enctype="multipart/form-data" class="max-w-5xl mx-auto">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
          
          <div class="md:col-span-1">
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              รูปภาพประกอบ
            </label>
            
            <div id="image-label" class="w-full aspect-square md:h-[290px] bg-gray-50 rounded-2xl flex flex-col items-center justify-center hover:bg-gray-100 border-2 border-dashed border-gray-300 hover:border-yellow-400 transition-all overflow-hidden relative group">
              
              <label for="image-input" id="placeholder-content" class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 cursor-pointer">
                <span class="text-5xl text-gray-400 mb-3 transition-transform group-hover:scale-110">📎</span>
                <span class="text-sm font-semibold text-gray-500">อัปโหลดรูปภาพ</span>
                <span class="text-xs text-gray-400 mt-1">คลิกเพื่อเลือกไฟล์(สูงสุด 4.5MB)</span>
              </label>

              <img id="image-preview" src="#" alt="Preview" class="hidden absolute inset-0 w-full h-full object-cover rounded-2xl p-1 pointer-events-none">
              
              <input type="file" name="image" id="image-input" class="sr-only" accept="image/*" onchange="previewImage(event)">
              
              <button type="button" id="remove-image-btn" onclick="removeImage(event)" class="hidden absolute top-2 right-2 bg-white/80 hover:bg-red-500 text-red-500 hover:text-white rounded-full p-1.5 shadow-md backdrop-blur-sm z-10 transition-colors" title="ลบรูปภาพ">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
              </button>
              
            </div>
          </div>

          <div class="md:col-span-2 space-y-6">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                ชื่อประเภทโต๊ะ <span class="text-red-500">*</span>
              </label>
              <input type="text" name="name" required
                     class="w-full h-14 bg-gray-100 rounded-xl px-4 outline-none focus:ring-2 focus:ring-yellow-400 transition"
                     placeholder="เช่น โต๊ะ VIP, โต๊ะครอบครัว">
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                รายละเอียด
              </label>
              <textarea name="description"
                class="w-full h-24 bg-gray-100 rounded-xl px-4 py-3 outline-none resize-none focus:ring-2 focus:ring-yellow-400 transition"
                placeholder="รายละเอียดเพิ่มเติมของประเภทโต๊ะ"></textarea>
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">
                จำนวนโต๊ะ <span class="text-red-500">*</span>
              </label>
              <div class="h-14 bg-gray-100 rounded-xl flex items-center px-4 focus-within:ring-2 focus-within:ring-yellow-400 transition">
                <span class="text-gray-500 mr-6">✏️</span>
                <input type="number" name="amount" min="1" required
                       class="bg-transparent w-full h-full outline-none"
                       placeholder="กรุณากรอกจำนวนโต๊ะ (เช่น 10)">
              </div>
            </div>
          </div>
        </div> 

        <div class="mt-10 md:mt-12">
          <button type="submit"
            class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold text-lg shadow-md hover:shadow-lg transition-all">
            บันทึกข้อมูลโต๊ะ
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
