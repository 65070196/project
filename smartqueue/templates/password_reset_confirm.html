{% extends "base_customer.html" %}
{% block content %}
<div class="min-h-[calc(100vh-60px)] flex items-center justify-center bg-slate-50 px-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
        {% if validlink %}
            <h2 class="text-2xl font-extrabold text-slate-800 mb-6">ตั้งรหัสผ่านใหม่</h2>
            <form method="POST" class="space-y-4">
                {% csrf_token %}
                {{ form.as_p }} <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold mt-4 shadow-lg hover:bg-blue-700 transition-all">
                    ยืนยันการเปลี่ยนรหัสผ่าน
                </button>
            </form>
        {% else %}
            <div class="text-center">
                <div class="text-5xl mb-4">❌</div>
                <h2 class="text-xl font-bold text-rose-600">ลิงก์หมดอายุ</h2>
                <p class="text-slate-500 mt-2">ลิงก์นี้ถูกใช้งานไปแล้วหรือหมดเวลา กรุณาขอลิงก์ใหม่อีกครั้ง</p>
                <a href="{% url 'password_reset' %}" class="inline-block mt-6 px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">ขอลิงก์ใหม่</a>
            </div>
        {% endif %}
    </div>
</div>

<style>
    /* ตกแต่งช่อง Input ที่มาจาก Django Form ให้สวยตามธีม */
    form p input {
        width: 100%;
        height: 3.5rem;
        background-color: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 0 1rem;
        margin-top: 0.5rem;
        outline: none;
    }
    form p label { font-weight: bold; font-size: 0.875rem; color: #334155; }
</style>
{% endblock %}
