{% extends "base_customer.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden">
  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x overflow-y-auto no-scrollbar">
    <div class="p-6 md:p-10 pb-24">
      
      <div class="mb-8 border-b border-gray-200 pb-4">
        <h2 class="text-2xl font-bold text-gray-800">แก้ไขโปรไฟล์ผู้ใช้</h2>
        <p class="text-gray-500 text-sm mt-1">อัปเดตข้อมูลส่วนตัวของคุณเพื่อให้ข้อมูลเป็นปัจจุบันเสมอ</p>
      </div>

      <div class="max-w-4xl mx-auto bg-gray-50 rounded-2xl shadow-sm border border-gray-200 p-8">
        
        <form method="POST" action="" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="flex flex-col items-center mb-10">
            <div class="w-32 h-32 bg-gray-200 rounded-full overflow-hidden border-4 border-white shadow-md mb-4 flex justify-center items-center relative group cursor-pointer">
              {% if user.profile_image %}
                <img src="{{ user.profile_image.url }}" alt="Profile Picture" class="w-full h-full object-cover">
              {% else %}
                <svg class="w-16 h-16 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                </svg>
              {% endif %}
              
              <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              </div>
              <input type="file" name="profile_image" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*">
            </div>
            <p class="text-sm font-medium text-indigo-600 hover:text-indigo-800 transition cursor-pointer">เปลี่ยนรูปภาพโปรไฟล์</p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
            
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">ชื่อ</label>
              <input type="text" name="first_name" value="{{ user.first_name }}" placeholder="กรอกชื่อของคุณ" 
                class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all text-gray-800">
            </div>

            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">นามสกุล</label>
              <input type="text" name="last_name" value="{{ user.last_name }}" placeholder="กรอกนามสกุลของคุณ" 
                class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all text-gray-800">
            </div>

            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">อีเมล</label>
              <input type="email" name="email" value="{{ user.email }}" placeholder="example@email.com" 
                class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all text-gray-800">
            </div>

            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">เบอร์โทรศัพท์</label>
              <input type="tel" name="phone" value="{{ user.phone }}" placeholder="08X-XXX-XXXX" 
                class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all text-gray-800">
            </div>

          </div>

          <div class="flex justify-end gap-4 mt-10 pt-6 border-t border-gray-200">
            <button type="button" onclick="history.back()" 
              class="px-6 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-lg transition-colors">
              ยกเลิก
            </button>
            <button type="submit" 
              class="px-8 py-2.5 bg-[#66d148] hover:bg-green-500 text-white font-bold rounded-lg shadow-sm transition-colors">
              บันทึกข้อมูล
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>
{% endblock %}
