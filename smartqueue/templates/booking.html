{% extends "base_customer.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden z-0">

  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x border-gray-100 overflow-y-auto no-scrollbar">

    <div class="p-6 md:p-10 pb-24">

      <div class="mb-6 border-l-4 border-yellow-400 pl-4 sticky top-0 bg-white/95 backdrop-blur z-10 py-2">
        <h2 class="text-3xl font-bold text-gray-800">จองคิว</h2>
        <p class="text-gray-500 text-sm">กรอกข้อมูลเพื่อทำการจองคิว</p>
      </div>
  
      <div class="max-w-3xl mx-auto space-y-6">

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            ร้านที่ต้องการจอง
          </label>
          <div class="h-14 bg-gray-100 rounded-xl flex items-center px-4 text-gray-600">
            SaltHouse – สยาม
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              วันที่ทำการจอง
            </label>
            <div class="h-14 bg-gray-100 rounded-xl flex items-center justify-between px-4">
              <span>12 / 08 / 2568</span>
              <span class="text-xl">🗓️</span>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              เวลาที่ทำการจอง
            </label>
            <div class="h-14 bg-gray-100 rounded-xl flex items-center justify-between px-4">
              <span>12 : 00</span>
              <span class="text-xl">⏰</span>
            </div>
          </div>

        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            โปรโมชั่น
          </label>
          <div class="flex gap-3">
            <button class="px-5 py-3 bg-yellow-300 hover:bg-yellow-400 rounded-xl font-semibold transition">
              เลือกโปรโมชั่น
            </button>
            <div class="flex-1 h-14 bg-gray-100 rounded-xl flex items-center px-4 text-gray-400">
              ยังไม่ได้เลือกโปรโมชั่น
            </div>
          </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 pt-4">
          <button class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold transition">
            ยืนยันการจอง
          </button>
          <button class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white rounded-xl font-bold transition">
            ยกเลิกการจอง
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
