{% extends "base_customer.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden z-0">

  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x border-gray-100 overflow-y-auto no-scrollbar">

    <div class="p-6 md:p-10 pb-24">

      <div class="mb-6 border-l-4 border-yellow-400 pl-4 sticky top-0 bg-white/95 backdrop-blur z-10 py-2">
        <h2 class="text-3xl font-bold text-gray-800">จองคิว</h2>
        <p class="text-gray-500 text-sm">ระบุจำนวนคนและเวลา ระบบจะเลือกโต๊ะที่เหมาะสมที่สุดให้คุณ</p>
      </div>
  
      <form method="POST" action="" class="max-w-3xl mx-auto space-y-6">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            ร้านที่ต้องการจอง
          </label>
          <div class="h-14 bg-gray-100 rounded-xl flex items-center px-4 text-gray-600 font-bold">
            🏪 {{ shop.shop_name }}
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            จำนวนลูกค้า <span class="text-red-500">*</span>
          </label>
          <input type="number" name="pax" min="1" placeholder="ระบุจำนวนคน (เช่น 2)" required 
                 class="w-full h-14 bg-gray-100 rounded-xl px-4 text-gray-700 font-bold outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              วันที่ทำการจอง
            </label>
            <input type="date" name="queue_date" value="{{ selected_date }}" min="{{ today_str }}" required
              onchange="window.location.href='?queue_date=' + this.value"
              class="w-full h-14 bg-gray-100 rounded-xl px-4 text-gray-700 font-bold outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all cursor-pointer">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
                เวลาที่ทำการจอง <span class="text-red-500">*</span>
            </label>
            <select name="queue_time" required class="w-full h-14 bg-gray-100 rounded-xl px-4 text-gray-700 font-bold outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all cursor-pointer">
              {% if is_closed %}
                  <option value="" disabled selected>-- วันนี้ร้านปิดทำการ --</option>
              {% elif not hour_range %}
                  <option value="" disabled selected>-- คิวสำหรับวันนี้เต็ม/หมดเวลาจองแล้ว --</option>
              {% else %}
                  <option value="" disabled selected>-- เลือกเวลา --</option>
                  {% for hour in hour_range %}
                      <option value="{{ hour|stringformat:'02d' }}:00">
                          {{ hour|stringformat:'02d' }}:00 น.
                      </option>
                  {% endfor %}
              {% endif %}
            </select>
          </div>

        </div>

        {% if error_message %}
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl text-sm text-center font-bold">
              {{ error_message }}
          </div>
        {% endif %}

        <div class="flex flex-col md:flex-row gap-4 pt-4">
          <a href="{% url 'shop-detail' shop.shop_id %}" class="flex-1 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-xl font-bold transition shadow-sm hover:shadow-md text-center flex items-center justify-center">
            ยกเลิก
          </a>
          <button type="submit" class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition shadow-sm hover:shadow-md">
            ยืนยันการจองคิว
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
