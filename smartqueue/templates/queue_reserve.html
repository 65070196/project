{% extends "base_customer.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden z-0">

  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x border-gray-100 overflow-y-auto no-scrollbar">

    <div class="p-6 md:p-10 pb-24">

      <div class="mb-6 border-l-4 border-yellow-400 pl-4 sticky top-0 bg-white/95 backdrop-blur z-10 py-2">
        <h2 class="text-3xl font-bold text-gray-800">จองคิว</h2>
        <p class="text-gray-500 text-sm">กรอกข้อมูลเพื่อทำการจองคิว</p>
      </div>
  
      <form method="POST" action="" class="max-w-3xl mx-auto space-y-6">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            ร้านที่ต้องการจอง
          </label>
          <div class="h-14 bg-gray-100 rounded-xl flex items-center px-4 text-gray-600 font-bold">
            {{shop.shop_name}}
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            เลือกประเภทโต๊ะ <span class="text-red-500">*</span>
          </label>
          <select name="table_id" required 
                  class="w-full h-14 bg-gray-100 rounded-xl px-4 text-gray-700 outline-none focus:ring-2 focus:ring-blue-400 transition-all cursor-pointer">
            <option value="" disabled selected>-- กรุณาเลือกประเภทโต๊ะ --</option>
            {% for table in tables %}
              <option value="{{ table.table_id }}">{{ table.name }}</option>
            {% empty %}
              <option value="" disabled>ขออภัย ร้านนี้ยังไม่มีโต๊ะให้บริการ</option>
            {% endfor %}
          </select>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              วันที่ทำการจอง
            </label>
            <input type="date" name="queue_date" required
                   class="w-full h-14 bg-gray-100 rounded-xl px-4 text-gray-700 outline-none focus:ring-2 focus:ring-blue-400 transition-all cursor-pointer">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              เวลาที่ทำการจอง
            </label>
            <input type="time" name="queue_time" id="queue_time" required
              step="1800"
              class="w-full h-14 bg-gray-100 rounded-xl px-4 text-gray-700 ...">
          </div>

        </div>

        {% if error_message %}
          <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl text-sm text-center font-bold">
              {{ error_message }}
          </div>
        {% endif %}
        <div class="flex flex-col md:flex-row gap-4 pt-4">
          <a href="{% url 'shop-detail' shop.shop_id %}" class="flex-1 py-3 bg-red-500 hover:bg-red-600 text-white rounded-xl font-bold transition shadow-sm hover:shadow-md text-center flex items-center justify-center">
            ยกเลิกการจอง
          </a>
          <button type="submit" class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-bold transition shadow-sm hover:shadow-md">
            ยืนยันการจอง
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
    const timeInput = document.getElementById('queue_time');

    timeInput.addEventListener('change', function() {
        const time = this.value; // เช่น "14:15"
        if (!time) return;

        let [hours, minutes] = time.split(':');
        minutes = parseInt(minutes);

        // ถ้าไม่ใช่ 0 หรือ 30 ให้ปัดลงหรือแจ้งเตือน
        if (minutes !== 0 && minutes !== 30) {
            alert('กรุณาเลือกเวลาเป็นนาทีที่ 00 หรือ 30 เท่านั้น (เช่น 14:00 หรือ 14:30)');
            
            // ทางเลือกที่ 1: ล้างค่าทิ้งเลย
            this.value = ""; 
            
            // หรือ ทางเลือกที่ 2: ปัดเศษให้เป็น 00 อัตโนมัติ
            // this.value = `${hours}:00`;
        }
    });
</script>
{% endblock %}
