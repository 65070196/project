{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก - On-Queue</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-image: url("{% static 'images/cafe.jpg' %}");
    }
  </style>
</head>

<body class="font-sans bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">

  <div class="fixed top-0 w-full flex items-center px-6 py-3 bg-gradient-to-r from-indigo-600 via-purple-600 to-fuchsia-500 shadow-lg z-50">
    <div class="bg-white text-indigo-600 rounded-full w-10 h-10 shadow-md flex items-center justify-center font-black text-xl mr-3">Q</div>
    <div class="text-xl font-extrabold text-white tracking-wide drop-shadow-sm">On-Queue</div>
  </div>

  <div class="fixed inset-0 bg-white/30 backdrop-blur-sm z-0"></div>

  <div class="relative min-h-screen flex items-center justify-center px-4 z-10 pt-24 pb-12">
    
    <div class="bg-white/95 backdrop-blur-xl p-8 md:p-10 rounded-3xl shadow-[0_20px_50px_rgba(107,33,168,0.15)] w-full max-w-2xl border border-white">
      
      <h2 class="text-3xl font-extrabold text-center mb-8 bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-purple-600">
        สมัครสมาชิก
      </h2>

      <form class="space-y-6" method="POST">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="md:col-span-2">
                <label class="block text-sm font-extrabold text-gray-700 mb-2 ml-1">ชื่อผู้ใช้งาน</label>
                <input type="text" name="username" value="{{ old_username|default:'' }}" placeholder="ตั้งชื่อผู้ใช้งาน (Username)"
                    class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-extrabold text-gray-700 mb-2 ml-1">ชื่อจริง</label>
                <input type="text" name="firstname" value="{{ old_firstname|default:'' }}" placeholder="ชื่อจริงของคุณ"
                    class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-extrabold text-gray-700 mb-2 ml-1">นามสกุล</label>
                <input type="text" name="lastname" value="{{ old_lastname|default:'' }}" placeholder="นามสกุลของคุณ"
                    class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all shadow-sm">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-extrabold text-gray-700 mb-2 ml-1">เบอร์โทรศัพท์</label>
                <input type="text" name="phone" value="{{ old_phone|default:'' }}" placeholder="08X-XXX-XXXX"
                    class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all shadow-sm">
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-extrabold text-gray-700 mb-2 ml-1">อีเมล</label>
                <input type="email" name="email" value="{{ old_email|default:'' }}" placeholder="example@email.com"
                    class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-extrabold text-gray-700 mb-2 ml-1">รหัสผ่าน</label>
                <input type="password" name="password" placeholder="อย่างน้อย 8 ตัวอักษร"
                    class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all shadow-sm">
            </div>

            <div>
                <label class="block text-sm font-extrabold text-gray-700 mb-2 ml-1">ยืนยันรหัสผ่าน</label>
                <input type="password" name="password_confirm" placeholder="พิมพ์รหัสผ่านอีกครั้ง"
                    class="w-full px-4 py-3.5 rounded-xl bg-gray-50 border border-gray-200 text-gray-900 font-medium focus:outline-none focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all shadow-sm">
            </div>

        </div>

        {% if error_message %}
            <div class="bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded-r-xl text-sm font-bold flex items-start gap-2 shadow-sm mt-6">
                <span class="text-lg leading-none">🚨</span>
                <span>{{ error_message }}</span>
            </div>
        {% endif %}

        <div class="pt-6 border-t border-gray-100 mt-6">
            <button type="submit" 
                class="w-full bg-gradient-to-r from-purple-600 to-fuchsia-500 hover:from-purple-700 hover:to-fuchsia-600 text-white font-extrabold py-3.5 px-4 rounded-xl transition-all shadow-md hover:shadow-lg hover:shadow-fuchsia-500/30 transform hover:-translate-y-0.5 text-lg">
                ยืนยันการสมัคร
            </button>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mt-6 text-sm font-bold px-2 gap-4 text-center">
            <a href="{% url 'register-s' %}" class="text-gray-500 hover:text-purple-600 transition-colors">
                สนใจสมัครบัญชีร้านค้า?
            </a>
            <a href="{% url 'login' %}" class="text-purple-600 hover:text-fuchsia-600 hover:underline transition-colors">
                มีบัญชีผู้ใช้อยู่แล้ว?
            </a>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
