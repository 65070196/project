{% extends "base_shop.html" %}
{% load static %}

{% block content %}
<div class="fixed top-[60px] left-0 right-0 bottom-0 flex justify-center overflow-hidden">

  <div class="bg-white w-full max-w-[1440px] h-full shadow-2xl border-x overflow-y-auto no-scrollbar">

    <div class="p-6 md:p-10 pb-24">

      
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800">รายการโปรโมชั่น</h2>
      </div>

      
      <div class="rounded-xl overflow-hidden shadow">

        
        <div class="grid grid-cols-6 bg-indigo-200 text-sm font-semibold text-gray-800 px-4 py-3">
          <div>รหัสโปรโมชั่น</div>
          <div>ชื่อโปรโมชั่น</div>
          <div>ส่วนลด</div>
          <div>วันเริ่มต้น</div>
          <div>วันสิ้นสุด</div>
          <div class="text-center">จัดการ</div>
        </div>

        
        <div class="grid grid-cols-6 items-center px-4 py-4 text-sm bg-gray-100">
          <div>1</div>
          <div>ลดวันจันทร์</div>
          <div class="font-semibold text-green-600">10%</div>
          <div>01/08/2568</div>
          <div>31/08/2568</div>
          <div class="flex justify-center gap-2">
            <button class="px-3 py-1 bg-orange-400 hover:bg-orange-500 text-white rounded-lg text-xs font-bold">แก้ไข</button>
            <button class="px-3 py-1 bg-red-500 hover:bg-red-600 text-white rounded-lg text-xs font-bold">ลบ</button>
          </div>
        </div>

      </div>

      
      <div class="flex justify-between items-center mt-6">

        
        <a href="{% url 'promo-add' %}"
           class="px-5 py-2 bg-lime-300 hover:bg-lime-400 rounded-full font-semibold text-sm">เพิ่มโปรโมชั่น
        </a>

        
        <div class="flex items-center gap-3">
          <button class="px-4 py-2 bg-lime-300 rounded-full text-sm font-semibold">ก่อนหน้า</button>

          <div class="w-8 h-8 bg-gray-300 rounded-lg flex items-center justify-center font-bold">1</div>

          <button class="px-4 py-2 bg-lime-300 rounded-full text-sm font-semibold">ถัดไป</button>
        </div>

      </div>

    </div>
  </div>
</div>
{% endblock %}
