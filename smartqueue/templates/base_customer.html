{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <title>On-Queue</title>

  <style>
    body {
      background-image: url("{% static 'images/cafe.jpg' %}");
    }
  </style>
</head>

<body class="font-sans bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">

  <header class="flex justify-between items-center px-6 py-3 bg-gradient-to-r from-indigo-600 via-purple-600 to-fuchsia-500 fixed w-full top-0 z-50 shadow-lg">
    
    <div class="flex items-center space-x-4">
      <a href="{% url 'home-c' %}" class="flex items-center gap-2 group">
        <div class="bg-white text-indigo-600 rounded-full w-10 h-10 shadow-md flex items-center justify-center font-black text-xl group-hover:scale-110 transition-transform">Q</div>
        <div class="text-xl font-extrabold text-white tracking-wide drop-shadow-sm">On-Queue</div>
      </a>
      
      <form action="{% url 'home-c' %}" method="GET" class="hidden md:flex items-center gap-2 relative">
        <div class="relative w-64">
          <div class="flex items-center bg-white/20 backdrop-blur-md rounded-full px-4 py-1.5 w-full shadow-inner border border-white/30 focus-within:bg-white focus-within:border-white transition-all group">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-white group-focus-within:text-indigo-500 mr-2 transition-colors">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
            <input type="text" id="searchInput" name="q" value="{{ request.GET.q }}" autocomplete="off" placeholder="ค้นหาร้านอาหาร..." class="outline-none text-sm w-full bg-transparent placeholder-white/70 text-white group-focus-within:text-gray-900 group-focus-within:placeholder-gray-400 transition-colors">
          </div>
          
          <div id="searchDropdown" class="absolute left-0 w-full mt-2 bg-white rounded-xl shadow-2xl border border-gray-100 hidden z-50 overflow-hidden">
            <ul id="searchList" class="divide-y divide-gray-50"></ul>
          </div>
        </div>

        <button type="submit" class="bg-[#eefc57] text-gray-900 font-bold px-6 py-1.5 rounded-full hover:bg-yellow-400 hover:shadow-lg hover:-translate-y-0.5 transition-all text-sm shadow-sm">ค้นหา</button>
      </form>
    </div>

    <div class="flex items-center space-x-8 text-sm font-bold text-white/90">
      {% if user.is_authenticated %}
        <a href="{% url 'home-c' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">หน้าแรก</a>
        <a href="{% url 'queue-check' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">ตรวจสอบคิว</a>
        <a href="{% url 'about' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">เกี่ยวกับ</a>
        
        <div class="relative inline-block text-left">
            <button onclick="toggleUserMenu()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur border border-white/20 text-white px-4 py-2 rounded-full transition-all shadow-sm focus:outline-none">
                <span>{{ user.get_full_name|default:user.username }}</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-40 bg-white rounded-xl shadow-2xl border border-gray-100 py-2 z-50">
                <a href="{% url 'view-c-profile' %}" class="block px-4 py-2 text-sm font-medium text-gray-700 hover:bg-indigo-50 hover:text-indigo-600 transition-colors text-center">
                    👤 ดูโปรไฟล์ผู้ใช้
                </a>
                <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm font-bold text-red-500 hover:bg-red-50 hover:text-red-600 transition-colors text-center">
                    🚪 ออกจากระบบ
                </a>
            </div>
        </div>

      {% else %}
        <a href="{% url 'home-c' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">หน้าแรก</a>
        <a href="{% url 'about' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">เกี่ยวกับ</a>
        
        <a href="{% url 'login' %}" class="bg-[#eefc57] text-gray-900 px-6 py-2 rounded-full hover:bg-yellow-400 hover:shadow-lg hover:-translate-y-0.5 transition-all font-bold shadow-sm">
            เข้าสู่ระบบ
        </a>
      {% endif %}
    </div>
  </header>

  <main class="container mx-auto pt-24 px-4">
      {% block content %}{% endblock %}
  </main>


  
  <script src="{% static 'js/script.js' %}"></script>
  
  <script>
    function toggleUserMenu() {
        document.getElementById('userMenuDropdown').classList.toggle('hidden');
    }


    window.addEventListener('click', function(e) {
        if (!document.getElementById('userMenuDropdown').contains(e.target) && !e.target.closest('button[onclick="toggleUserMenu()"]')) {
            document.getElementById('userMenuDropdown').classList.add('hidden');
        }
    });

    const searchInput = document.getElementById('searchInput');
    const searchDropdown = document.getElementById('searchDropdown');
    const searchList = document.getElementById('searchList');

    searchInput.addEventListener('input', async function() {
        const query = this.value.trim();
        
        if (query.length > 0) {
            try {
                // ยิงคำที่พิมพ์ไปถามหลังบ้าน (Django)
                const response = await fetch(`/api/search-suggestion/?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                searchList.innerHTML = ''; // เคลียร์ของเก่า
                
                if (data.results.length > 0) {
                    // ถ้าเจอร้าน ให้วนลูปสร้างรายชื่อ
                    data.results.forEach(shop => {
                        const li = document.createElement('li');
                        // คลิกร้านใน Dropdown แล้วเด้งไปหน้าร้านนั้นเลย
                        li.innerHTML = `
                            <a href="/shop-detail/${shop.shop_id}/" class="block px-4 py-3 hover:bg-[#a7a1f9]/10 text-black text-sm transition-colors cursor-pointer flex items-center gap-2">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                ${shop.shop_name}
                            </a>
                        `;
                        searchList.appendChild(li);
                    });
                } else {
                    // ถ้าไม่เจอร้าน
                    searchList.innerHTML = `<li class="px-4 py-3 text-gray-400 text-sm italic">ไม่พบร้านค้าที่ค้นหา...</li>`;
                }
                
                searchDropdown.classList.remove('hidden'); // โชว์กล่อง
            } catch (error) {
                console.error('Search error:', error);
            }
        } else {
            // ถ้าลบคำค้นหาจนหมด ให้ซ่อนกล่อง
            searchDropdown.classList.add('hidden');
        }
    });

    // ถ้าลูกค้าคลิกที่อื่นบนจอ (นอกจากช่องค้นหา) ให้พับกล่องเก็บไปเนียนๆ
    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) {
            searchDropdown.classList.add('hidden');
        }
    });
  </script>
</body>
</html>
