{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <title>On-Queue</title>

  <style>
    body {
      background-image: url("{% static 'images/cafe.jpg' %}");
    }
  </style>
</head>

<body class="font-sans bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">

  <header class="flex justify-between items-center px-6 py-3 bg-[#a7a1f9] fixed w-full top-0 z-50 shadow-sm">
    
    <div class="flex items-center space-x-4">
      <a href="{% url 'home-c' %}" class="flex items-center gap-2">
        <div class="bg-white rounded-full w-10 h-10 shadow-sm"></div>
        <div class="text-xl font-bold text-black tracking-wide">On-Queue</div>
      </a>
      
      <div class="hidden md:flex items-center gap-2">
        <div class="flex items-center bg-white rounded-full px-4 py-1.5 w-64 shadow-inner">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-gray-500 mr-2">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>
          <input type="text" placeholder="" class="outline-none text-sm w-full bg-transparent placeholder-gray-400">
        </div>
        <button class="bg-[#eefc57] text-black font-bold px-6 py-1.5 rounded-full hover:bg-yellow-300 transition text-sm shadow-sm">ค้นหา</button>
      </div>
    </div>

    <div class="flex items-center space-x-8 text-sm font-bold text-black">
      {% if user.is_authenticated %}
        <a href="{% url 'home-c' %}" class="hover:text-white transition duration-200">หน้าแรก</a>
        <a href="{% url 'queue-check' %}" class="hover:text-white transition duration-200">ตรวจสอบคิว</a>
        <a href="#" class="hover:text-white transition duration-200">เกี่ยวกับ</a>
        
        <div class="relative inline-block text-left">
            <button onclick="toggleUserMenu()" class="flex items-center gap-2 bg-white text-black px-4 py-2 rounded-full hover:bg-gray-100 transition shadow-sm focus:outline-none">
                <span>{{ user.username }}</span>
                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-40 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-50">
                <a href="{% url 'edit-c-profile' %}" class="block px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-indigo-600 transition-colors text-center">
                    แก้ไขโปรไฟล์
                </a>
                <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm font-bold text-red-500 hover:bg-red-50 hover:text-red-600 transition-colors text-center">
                    ออกจากระบบ
                </a>
            </div>


        </div>

      {% else %}
        <a href="{% url 'home-c' %}" class="hover:text-white transition duration-200">หน้าแรก</a>
        <a href="#" class="hover:text-white transition duration-200">เกี่ยวกับ</a>
        
        <a href="{% url 'login' %}" class="bg-[#eefc57] text-black px-6 py-2 rounded-full hover:bg-yellow-300 transition font-bold shadow-sm">
            เข้าสู่ระบบ
        </a>
      {% endif %}
    </div>
  </header>

  <main class="container mx-auto pt-24 px-4">
      {% block content %}{% endblock %}
  </main>

  <script src="{% static 'js/script.js' %}"></script>
  
  <script>
    function toggleUserMenu() {
        document.getElementById('userMenuDropdown').classList.toggle('hidden');
    }


    window.addEventListener('click', function(e) {
        if (!document.getElementById('userMenuDropdown').contains(e.target) && !e.target.closest('button[onclick="toggleUserMenu()"]')) {
            document.getElementById('userMenuDropdown').classList.add('hidden');
        }
    });
  </script>
</body>
</html>
