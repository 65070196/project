{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On-Queue - Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-image: url("{% static 'images/cafe.jpg' %}");
    }
  </style>
</head>

<body class="font-sans bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">

  <header class="flex justify-between items-center px-6 py-3 bg-[#f9d28f] fixed w-full top-0 z-50 shadow-md">
    
    <div class="flex items-center space-x-4">
      <a href="{% url 'home-s' %}" class="flex items-center gap-3">
        <div class="bg-white rounded-full w-10 h-10 shadow-sm flex items-center justify-center overflow-hidden">
             </div> 
        <div class="text-xl font-bold text-black tracking-wide">On-Queue</div>
      </a>
    </div>

    <div class="flex items-center space-x-6 text-sm font-bold text-black">
      <a href="#" class="hover:text-white transition duration-200">จัดการคิว</a>
      <a href="#" class="hover:text-white transition duration-200">จัดการโปรโมชั่น</a>
      <a href="#" class="hover:text-white transition duration-200">จัดการโต๊ะ</a>
      <a href="#" class="hover:text-white transition duration-200">โปรโมชั่น</a>
      
      {% if user.is_authenticated %}
      <a href="#" class="bg-[#fcd34d] text-black px-6 py-2 rounded-full hover:bg-[#fbbf24] transition font-bold shadow-md">
          ร้าน {{ user.username }}
      </a>
      {% else %}
      <a href="{% url 'login' %}" class="bg-[#fcd34d] text-black px-6 py-2 rounded-full hover:bg-[#fbbf24] transition font-bold shadow-md">
          เข้าสู่ระบบ
      </a>
      {% endif %}
    </div>
  </header>

  <main class="container mx-auto pt-24 px-4 pb-10">
      {% block content %}{% endblock %}
  </main>

</body>
</html>
