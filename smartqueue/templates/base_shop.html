{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On-Queue - Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-image: url("{% static 'images/cafe.jpg' %}");
    }
  </style>
</head>

<body class="font-sans bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">

  <header class="flex justify-between items-center px-6 py-3 bg-[#f9d28f] fixed w-full top-0 z-50 shadow-md">
    
    <div class="flex items-center space-x-4">
      <a href="{% url 'home-s' %}" class="flex items-center gap-3">
        <div class="bg-white rounded-full w-10 h-10 shadow-sm flex items-center justify-center overflow-hidden">
             </div> 
        <div class="text-xl font-bold text-black tracking-wide">On-Queue</div>
      </a>
    </div>

    <div class="flex items-center space-x-6 text-sm font-bold text-black">
      <a href="{% url 'home-s' %}" class="hover:text-white transition duration-200">จัดการคิว</a>
      <a href="{% url 'promo-manage' %}" class="hover:text-white transition duration-200">จัดการโปรโมชั่น</a>
      <a href="{% url 'table-manage' %}" class="hover:text-white transition duration-200">จัดการโต๊ะ</a>
      
      {% if user.is_authenticated %}
      <div class="relative inline-block text-left">
      <button onclick="toggleUserMenu()" 
        class="bg-[#fcd34d] text-black px-6 py-2 rounded-full hover:bg-[#fbbf24] transition font-bold shadow-md flex items-center gap-2">
        
        <span>ร้าน {{ user.username }}</span>
        <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>

      <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-40 bg-white rounded-xl shadow-lg border border-gray-100 py-2 z-50">
        <a href="{% url 'logout' %}" class="block px-4 py-2 text-sm font-bold text-red-500 hover:bg-red-50 hover:text-red-600 transition-colors text-center">
          ออกจากระบบ
        </a>
      </div>
      {% else %}
      <a href="{% url 'login' %}" class="bg-[#fcd34d] text-black px-6 py-2 rounded-full hover:bg-[#fbbf24] transition font-bold shadow-md">
          เข้าสู่ระบบ
      </a>
      {% endif %}
    </div>
  </header>

  <main class="container mx-auto pt-24 px-4 pb-10">
      {% block content %}{% endblock %}
  </main>

  <script>
    function toggleUserMenu() {
        document.getElementById('userMenuDropdown').classList.toggle('hidden');
    }


    window.addEventListener('click', function(e) {
        if (!document.getElementById('userMenuDropdown').contains(e.target) && !e.target.closest('button[onclick="toggleUserMenu()"]')) {
            document.getElementById('userMenuDropdown').classList.add('hidden');
        }
    });
  </script>

  <script src="{% static 'js/script.js' %}"></script>

</body>
</html>
