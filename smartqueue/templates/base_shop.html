{% load static %}

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On-Queue - Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Prompt', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    body {
      background-image: url("{% static 'images/cafe.jpg' %}");
    }
  </style>
</head>

<body class="font-sans bg-center bg-cover bg-no-repeat bg-fixed min-h-screen text-gray-800">

  <header class="flex justify-between items-center px-6 py-3 bg-gradient-to-r from-slate-900 via-slate-800 to-blue-900 fixed w-full top-0 z-50 shadow-lg border-b border-white/10">
    
    <div class="flex items-center space-x-4">
      <a href="{% url 'home-s' %}" class="flex items-center gap-2 group">
        <div class="bg-gradient-to-br from-[#eefc57] to-yellow-400 text-slate-900 rounded-lg w-10 h-10 shadow-md flex items-center justify-center font-black text-xl group-hover:scale-110 transition-transform">🏪</div>
        <div class="text-xl font-extrabold text-white tracking-wide drop-shadow-sm">On-Queue <span class="text-[10px] bg-blue-600/50 text-blue-100 px-2 py-0.5 rounded-full uppercase ml-1 border border-blue-400/30 tracking-wider">Shop Admin</span></div>
      </a>
    </div>

    <div class="flex items-center space-x-8 text-sm font-bold text-gray-300">
      {% if user.is_authenticated %}
        <a href="{% url 'home-s' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">หน้าแรก</a>
        <a href="{% url 'queue-all' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">จัดการคิวทั้งหมด</a>
      <a href="{% url 'promo-manage' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">จัดการโปรโมชั่น</a>
      <a href="{% url 'table-manage' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">จัดการโต๊ะ</a>
      <a href="{% url 'opendate-edit' %}" class="hover:text-white hover:drop-shadow-md transition duration-200">จัดการเวลา</a>
        
        <div class="relative inline-block text-left">
            <button onclick="toggleUserMenu()" class="flex items-center gap-2 bg-slate-800/50 hover:bg-slate-700/80 backdrop-blur border border-white/10 text-white px-4 py-2 rounded-full transition-all shadow-sm focus:outline-none">
                <span class="text-yellow-400 mr-1">👑</span> 
                <span>{{ user.shop.shop_name|default:user.username }}</span>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <div id="userMenuDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-2xl border border-gray-100 py-2 z-50 overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-50 bg-slate-50 mb-1">
                    <p class="text-xs text-gray-500 font-medium">เข้าสู่ระบบในชื่อ</p>
                    <p class="text-sm font-bold text-slate-800 truncate">{{ user.username }}</p>
                </div>
                <a href="{% url 'view-s-profile' %}" class="block px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-blue-50 hover:text-blue-700 transition-colors flex items-center gap-2">
                    👤 ดูโปรไฟล์ร้านค้า
                </a>
                <a href="{% url 'logout' %}" class="block px-4 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 hover:text-red-600 transition-colors border-t border-gray-50 flex items-center gap-2">
                    🚪 ออกจากระบบ
                </a>
            </div>
        </div>
      {% endif %}
    </div>
  </header>

  <main class="container mx-auto pt-24 px-4 pb-10">
      {% block content %}{% endblock %}
  </main>


  <script src="{% static 'js/script.js' %}?v=2"></script>

</body>
</html>
